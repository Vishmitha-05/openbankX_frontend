<div class="login-wrapper">
  <div class="login-container">
    <div class="login-card">

      <div class="login-header">
        <div class="login-logo">
          <i class="fas fa-university"></i>
        </div>
        <h1>OpenBank<span class="accent">X</span></h1>
        <p class="login-subtitle">Secure Online Banking Platform</p>
      </div>

      <div class="alert alert-error" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle"></i>
        {{ errorMessage }}
      </div>

      <div class="alert alert-success" *ngIf="successMessage">
        <i class="fas fa-check-circle"></i>
        {{ successMessage }}
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email"
                 class="form-control with-icon"
                 placeholder="Enter your email"
                 [(ngModel)]="email"
                 (keyup.enter)="login()">
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>Password</label>
          <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password"
                 class="form-control with-icon"
                 placeholder="Enter your password"
                 [(ngModel)]="password"
                 (keyup.enter)="login()">
        </div>
      </div>

      <button class="btn btn-primary btn-full"
              (click)="login()"
              [disabled]="isLoading">
        <span *ngIf="!isLoading">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </span>
        <span *ngIf="isLoading">
          <i class="fas fa-spinner fa-spin"></i> Signing in...
        </span>
      </button>

      <div class="register-link">
        New to OpenBankX? <a routerLink="/register">Open an account</a>
      </div>

      <div class="trust-strip">
        <span><i class="fas fa-shield-alt"></i> PSD2 Compliant</span>
        <span class="dot"></span>
        <span><i class="fas fa-lock"></i> 256-bit Encrypted</span>
      </div>
    </div>
  </div>
</div>
