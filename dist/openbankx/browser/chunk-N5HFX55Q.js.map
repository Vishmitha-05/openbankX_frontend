<div class="page-content">
  <div class="page-header">
    <div>
      <h1><i class="fas fa-building"></i> Register TPP Company</h1>
      <p class="page-subtitle">Onboard your Third-Party Provider organisation</p>
    </div>
  </div>

  <div class="glass-card max-w-600">
    <div class="alert alert-error" *ngIf="errorMessage">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>
    <div class="alert alert-success" *ngIf="successMessage">
      <i class="fas fa-check-circle"></i> {{ successMessage }}
    </div>

    <div class="form-group">
      <label>Legal Company Name</label>
      <input type="text" class="form-control" placeholder="e.g. FinTech Solutions Ltd" [(ngModel)]="legalName">
    </div>

    <div class="form-group">
      <label>Registration Number</label>
      <input type="text" class="form-control" placeholder="e.g. FCA-123456" [(ngModel)]="registrationNumber">
    </div>

    <div class="form-group">
      <label>Contact Email</label>
      <input type="email" class="form-control"
             [(ngModel)]="contactInfo"
             readonly>
      <small class="text-muted">Linked to your account — used to attribute TPP and apps to you.</small>
    </div>

    <div class="form-group">
      <label>Certification Reference (Optional)</label>
      <input type="text" class="form-control" placeholder="eIDAS certificate ref" [(ngModel)]="certificationRef">
    </div>

    <button class="btn btn-primary btn-full" (click)="register()" [disabled]="isSubmitting">
      <span *ngIf="!isSubmitting"><i class="fas fa-rocket"></i> Register TPP</span>
      <span *ngIf="isSubmitting"><i class="fas fa-spinner fa-spin"></i> Registering...</span>
    </button>
  </div>
</div>
