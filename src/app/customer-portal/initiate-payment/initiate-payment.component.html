<div class="page-content">

  <div class="page-header">
    <h1>
      <i class="fas fa-paper-plane"></i> Initiate Payment
    </h1>
    <p class="page-subtitle" *ngIf="appName">
      Accessed via <strong>{{ appName }}</strong>
    </p>
  </div>

  <!-- BLOCKED -->
  <div class="glass-card text-center"
       *ngIf="!isCheckingPermission && !hasPaymentAccess">
    <i class="fas fa-lock lock-icon"></i>
    <h3>Access Restricted</h3>
    <p class="text-muted">{{ errorMessage }}</p>
    <button class="btn btn-primary mt-16" (click)="cancel()">
      Go Back
    </button>
  </div>

  <!-- LOADING -->
  <div class="loading-container" *ngIf="isCheckingPermission">
    <div class="spinner"></div>
    Checking consent...
  </div>

  <!-- PAYMENT FORM -->
  <div class="glass-card max-w-600"
       *ngIf="!isCheckingPermission && hasPaymentAccess">

    <div class="alert alert-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="alert alert-success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="form-group">
      <label>From Account</label>
      <select class="form-control" [(ngModel)]="selectedAccountId">
        <option [ngValue]="null" disabled>Select an account</option>
        <option *ngFor="let acc of accounts" [ngValue]="acc.accountId">
          {{ acc.accountNumberMasked }} — {{ acc.currency }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label>To Account (IBAN / Account Number)</label>
      <input type="text" class="form-control"
             [(ngModel)]="payeeAccount">
    </div>

    <div class="form-group">
      <label>Amount (GBP)</label>
      <input type="number" class="form-control"
             [(ngModel)]="amount">
    </div>

    <div class="form-group">
      <label>Reference (Optional)</label>
      <input type="text" class="form-control"
             [(ngModel)]="narrative">
    </div>

    <div class="flex gap-16 mt-20">
      <button class="btn btn-primary flex-1"
        (click)="submitPayment()" [disabled]="isSubmitting">
        Submit
      </button>
      <button class="btn btn-secondary flex-1"
        (click)="cancel()">
        Cancel
      </button>
    </div>

  </div>
</div>
