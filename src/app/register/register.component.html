<div class="register-wrapper">
  <div class="register-bg-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="register-container">
    <div class="register-card">
      <!-- Header -->
      <div class="register-header">
        <div class="register-logo">
          <i class="fas fa-user-plus"></i>
        </div>
        <h1>Create Account</h1>
        <p class="register-subtitle">Join the OpenBankX platform</p>
      </div>

      <!-- Alerts -->
      <div class="alert alert-error" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </div>
      <div class="alert alert-success" *ngIf="successMessage">
        <i class="fas fa-check-circle"></i> {{ successMessage }}
      </div>

      <!-- Name -->
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" class="form-control with-icon" placeholder="Enter your full name" [(ngModel)]="name">
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" class="form-control with-icon" placeholder="your@email.com" [(ngModel)]="email">
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-control with-icon" placeholder="Create a secure password" [(ngModel)]="password">
        </div>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label>Phone Number</label>
        <div class="input-icon">
          <i class="fas fa-phone"></i>
          <input type="tel" class="form-control with-icon" placeholder="+91-9876543210" [(ngModel)]="phone">
        </div>
      </div>

      <!-- Role Selection -->
      <div class="form-group">
        <label>Select Role</label>
        <div class="role-select-grid">
          <div *ngFor="let r of roles"
               class="role-option"
               [class.selected]="role === r.value"
               (click)="role = r.value">
            <i [class]="r.icon"></i>
            <span class="role-option-label">{{ r.label }}</span>
            <span class="role-option-desc">{{ r.desc }}</span>
          </div>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn btn-primary btn-full" (click)="register()" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting"><i class="fas fa-rocket"></i> Create Account</span>
        <span *ngIf="isSubmitting"><i class="fas fa-spinner fa-spin"></i> Creating...</span>
      </button>

      <!-- Login Link -->
      <div class="login-link">
        Already have an account? <a routerLink="/login">Sign in</a>
      </div>
    </div>
  </div>
</div>
